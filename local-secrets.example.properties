# Copy this file to local-secrets.properties and fill your credentials
# Do NOT commit local-secrets.properties

gmail.username=your_email@gmail.com
gmail.appPassword=your_16_chars_app_password

# Google OAuth (Desktop)
google.clientId=your_google_client_id.apps.googleusercontent.com
google.clientSecret=your_google_client_secret
google.redirectUri=http://localhost:8765/oauth2/callback
